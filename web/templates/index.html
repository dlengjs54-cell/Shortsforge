<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShortsForge — 쇼츠 자동 생성</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-primary: #0a0a0f;
  --bg-card: #12121a;
  --bg-card-hover: #1a1a26;
  --bg-input: #0e0e16;
  --border: #1e1e2e;
  --border-focus: #3b82f6;
  --text-primary: #e4e4ec;
  --text-secondary: #7a7a8e;
  --text-muted: #4a4a5e;
  --accent: #3b82f6;
  --accent-glow: rgba(59, 130, 246, 0.15);
  --success: #22c55e;
  --warning: #eab308;
  --error: #ef4444;
  --running: #8b5cf6;
}

html { font-size: 15px; }
body {
  font-family: 'IBM Plex Sans KR', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── HEADER ── */
.header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(10, 10, 15, 0.85);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 0 2rem;
}
.header-inner {
  max-width: 1400px; margin: 0 auto;
  display: flex; align-items: center; justify-content: space-between;
  height: 64px;
}
.logo {
  display: flex; align-items: center; gap: 10px;
  font-weight: 700; font-size: 1.15rem; letter-spacing: -0.5px;
}
.logo-icon {
  width: 32px; height: 32px; border-radius: 8px;
  background: linear-gradient(135deg, #3b82f6, #8b5cf6);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
}
.header-stats {
  display: flex; gap: 1.5rem; font-size: 0.8rem; color: var(--text-secondary);
}
.header-stats span { display: flex; align-items: center; gap: 5px; }
.stat-dot {
  width: 7px; height: 7px; border-radius: 50%;
  display: inline-block;
}
.stat-dot.running { background: var(--running); animation: pulse 2s infinite; }
.stat-dot.done { background: var(--success); }

/* ── LAYOUT ── */
.container {
  max-width: 1400px; margin: 0 auto;
  padding: 1.5rem 2rem 4rem;
}

/* ── CREATE SECTION ── */
.create-section {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1.5rem;
  margin-bottom: 1.5rem;
}
.create-tabs {
  display: flex; gap: 0; margin-bottom: 1.2rem;
  border-bottom: 1px solid var(--border);
}
.create-tab {
  padding: 0.6rem 1.2rem;
  font-size: 0.85rem; font-weight: 500;
  color: var(--text-secondary);
  cursor: pointer; border: none; background: none;
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
}
.create-tab.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}
.create-tab:hover { color: var(--text-primary); }

.create-panel { display: none; }
.create-panel.active { display: block; }

.input-row {
  display: flex; gap: 0.8rem; align-items: flex-start;
}
.input-row input, .input-row textarea {
  flex: 1; padding: 0.75rem 1rem;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text-primary);
  font-family: inherit; font-size: 0.9rem;
  transition: border-color 0.2s;
  resize: vertical;
}
.input-row input:focus, .input-row textarea:focus {
  outline: none;
  border-color: var(--border-focus);
  box-shadow: 0 0 0 3px var(--accent-glow);
}
.input-row textarea {
  min-height: 100px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.82rem; line-height: 1.7;
}
.input-hint {
  font-size: 0.75rem; color: var(--text-muted);
  margin-top: 0.4rem;
}

.btn {
  padding: 0.75rem 1.5rem;
  border: none; border-radius: 8px;
  font-family: inherit; font-size: 0.85rem; font-weight: 600;
  cursor: pointer; transition: all 0.2s;
  white-space: nowrap;
}
.btn-primary {
  background: var(--accent);
  color: #fff;
}
.btn-primary:hover { background: #2563eb; transform: translateY(-1px); }
.btn-primary:disabled {
  opacity: 0.4; cursor: not-allowed; transform: none;
}
.btn-sm {
  padding: 0.4rem 0.8rem; font-size: 0.78rem;
}
.btn-outline {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-secondary);
}
.btn-outline:hover {
  border-color: var(--text-secondary);
  color: var(--text-primary);
}
.btn-danger { background: rgba(239,68,68,0.1); color: var(--error); border: 1px solid rgba(239,68,68,0.2); }
.btn-danger:hover { background: rgba(239,68,68,0.2); }
.btn-success { background: rgba(34,197,94,0.1); color: var(--success); border: 1px solid rgba(34,197,94,0.2); }
.btn-success:hover { background: rgba(34,197,94,0.2); }

/* ── PROJECT LIST ── */
.section-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 1rem;
}
.section-title {
  font-size: 0.85rem; font-weight: 600; color: var(--text-secondary);
  text-transform: uppercase; letter-spacing: 1px;
}

.project-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
  gap: 0.8rem;
}

.project-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1.2rem;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
}
.project-card:hover {
  background: var(--bg-card-hover);
  border-color: #2a2a3e;
  transform: translateY(-2px);
}
.project-card.running {
  border-color: rgba(139, 92, 246, 0.3);
}
.project-card.running::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, var(--running), var(--accent), var(--running));
  background-size: 200% 100%;
  animation: shimmer 2s linear infinite;
}

.card-top {
  display: flex; justify-content: space-between; align-items: flex-start;
  margin-bottom: 0.6rem;
}
.card-topic {
  font-size: 0.95rem; font-weight: 600; line-height: 1.4;
  flex: 1; margin-right: 0.8rem;
}
.card-badge {
  font-size: 0.7rem; font-weight: 600;
  padding: 3px 8px; border-radius: 4px;
  text-transform: uppercase; letter-spacing: 0.5px;
  flex-shrink: 0;
}
.badge-done { background: rgba(34,197,94,0.12); color: var(--success); }
.badge-running { background: rgba(139,92,246,0.12); color: var(--running); }
.badge-failed { background: rgba(239,68,68,0.12); color: var(--error); }
.badge-queued { background: rgba(234,179,8,0.12); color: var(--warning); }
.badge-pending { background: rgba(74,74,94,0.3); color: var(--text-muted); }

.card-stages {
  display: flex; gap: 3px; margin: 0.8rem 0;
}
.stage-pip {
  flex: 1; height: 3px; border-radius: 2px;
  background: var(--border);
}
.stage-pip.done { background: var(--success); }
.stage-pip.running { background: var(--running); animation: pulse 1.5s infinite; }
.stage-pip.failed { background: var(--error); }

.card-meta {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 0.75rem; color: var(--text-muted);
}
.card-actions {
  display: flex; gap: 0.4rem;
  opacity: 0; transition: opacity 0.2s;
}
.project-card:hover .card-actions { opacity: 1; }

/* ── DETAIL PANEL ── */
.detail-overlay {
  position: fixed; inset: 0;
  background: rgba(0, 0, 0, 0.6);
  backdrop-filter: blur(4px);
  z-index: 200; display: none;
  justify-content: flex-end;
}
.detail-overlay.open { display: flex; }

.detail-panel {
  width: 580px; max-width: 95vw;
  background: var(--bg-primary);
  border-left: 1px solid var(--border);
  height: 100vh; overflow-y: auto;
  padding: 1.5rem;
  animation: slideIn 0.25s ease-out;
}
.detail-close {
  background: none; border: none; color: var(--text-secondary);
  font-size: 1.5rem; cursor: pointer; float: right;
  padding: 0.3rem 0.6rem; border-radius: 6px;
}
.detail-close:hover { background: var(--bg-card); color: var(--text-primary); }

.detail-title {
  font-size: 1.2rem; font-weight: 700;
  margin: 0.5rem 0 0.3rem; line-height: 1.4;
}
.detail-id {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.72rem; color: var(--text-muted);
  margin-bottom: 1.2rem;
}

.detail-section {
  margin-bottom: 1.2rem;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 1rem;
}
.detail-section-title {
  font-size: 0.75rem; font-weight: 600; color: var(--text-secondary);
  text-transform: uppercase; letter-spacing: 0.8px;
  margin-bottom: 0.6rem;
}
.detail-section pre {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.78rem; line-height: 1.6;
  color: var(--text-primary);
  white-space: pre-wrap; word-break: break-word;
}

.script-field {
  margin-bottom: 0.6rem;
}
.script-label {
  font-size: 0.7rem; font-weight: 600; color: var(--accent);
  text-transform: uppercase; letter-spacing: 0.5px;
  margin-bottom: 0.2rem;
}
.script-text {
  font-size: 0.88rem; line-height: 1.6;
}

.log-list {
  max-height: 200px; overflow-y: auto;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.72rem; line-height: 1.8;
  color: var(--text-secondary);
}

.detail-actions {
  display: flex; gap: 0.5rem; flex-wrap: wrap;
  margin-top: 1rem;
}

/* ── EMPTY STATE ── */
.empty-state {
  text-align: center; padding: 4rem 2rem;
  color: var(--text-muted);
}
.empty-icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.3; }
.empty-text { font-size: 0.9rem; }

/* ── ANIMATIONS ── */
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}
@keyframes shimmer {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}
@keyframes slideIn {
  from { transform: translateX(40px); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.project-card { animation: fadeIn 0.3s ease-out; }

/* ── TOAST ── */
.toast-container {
  position: fixed; bottom: 1.5rem; right: 1.5rem;
  z-index: 999; display: flex; flex-direction: column; gap: 0.5rem;
}
.toast {
  padding: 0.8rem 1.2rem;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px; font-size: 0.82rem;
  animation: fadeIn 0.3s ease-out;
  max-width: 350px;
}
.toast.success { border-color: rgba(34,197,94,0.3); }
.toast.error { border-color: rgba(239,68,68,0.3); }

/* ── RESPONSIVE ── */
@media (max-width: 768px) {
  .header { padding: 0 1rem; }
  .container { padding: 1rem; }
  .project-grid { grid-template-columns: 1fr; }
  .detail-panel { width: 100%; }
  .input-row { flex-direction: column; }
  .header-stats { display: none; }
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">🎬</div>
      <span>ShortsForge</span>
    </div>
    <div class="header-stats" id="headerStats">
      <span><span class="stat-dot done"></span> 완료 <b id="statDone">0</b></span>
      <span><span class="stat-dot running"></span> 진행 <b id="statRunning">0</b></span>
    </div>
  </div>
</header>

<!-- MAIN -->
<div class="container">

  <!-- CREATE -->
  <div class="create-section">
    <div class="create-tabs">
      <button class="create-tab active" onclick="switchTab('single')">단일 생성</button>
      <button class="create-tab" onclick="switchTab('batch')">일괄 생성</button>
      <button class="create-tab" onclick="switchTab('topics')">🎯 주제 뱅크</button>
    </div>

    <div id="panelSingle" class="create-panel active">
      <div class="input-row">
        <input type="text" id="topicInput" placeholder="쇼츠 주제를 입력하세요 (예: 해외출장 시 와이파이 절약 꿀팁 3가지)"
               onkeydown="if(event.key==='Enter')createSingle()">
        <button class="btn btn-primary" onclick="createSingle()" id="btnCreate">생성 시작</button>
      </div>
    </div>

    <div id="panelBatch" class="create-panel">
      <div class="input-row">
        <textarea id="batchInput" placeholder="한 줄에 주제 하나씩 입력&#10;&#10;해외출장 시 와이파이 절약 꿀팁 3가지&#10;해외박람회 부스 예약 실전 노하우&#10;기업연수 예산 아끼는 항공권 예약법&#10;&#10;# 으로 시작하는 줄은 무시됩니다"></textarea>
        <button class="btn btn-primary" onclick="createBatch()" id="btnBatch" style="align-self:flex-start">일괄 생성</button>
      </div>
      <div class="input-hint">💡 한 줄에 주제 하나. 빈 줄과 #으로 시작하는 줄은 무시됩니다.</div>
    </div>

    <div id="panelTopics" class="create-panel">
      <!-- 스케줄러 상태 -->
      <div style="display:flex;gap:1rem;align-items:center;margin-bottom:1rem;padding:0.8rem;background:var(--bg-input);border-radius:8px;flex-wrap:wrap">
        <span style="font-size:0.82rem;color:var(--text-secondary)">⏰ 자동 생성:</span>
        <span style="font-size:0.85rem;font-weight:600" id="schedInfo">매일 06:00 / 1편</span>
        <span style="font-size:0.75rem;color:var(--text-muted)">|</span>
        <span style="font-size:0.82rem;color:var(--text-secondary)">📦 대기 주제:</span>
        <span style="font-size:0.85rem;font-weight:600" id="bankPending">-</span>
        <div style="flex:1"></div>
        <button class="btn btn-sm btn-outline" onclick="generateTopics(5)" id="btnGenTopics">🤖 AI 주제 5개 생성</button>
        <button class="btn btn-sm btn-primary" onclick="createFromNext(1)">▶ 다음 주제로 영상 생성</button>
      </div>

      <!-- 대기 주제 목록 -->
      <div id="topicBankList" style="max-height:300px;overflow-y:auto"></div>
      <div class="input-hint" style="margin-top:0.6rem">💡 AI가 카테고리를 순환하며 중복 없이 주제를 생성합니다. 마음에 안 드는 주제는 건너뛰기하세요.</div>
    </div>
  </div>

  <!-- PROJECTS -->
  <div class="section-header">
    <span class="section-title">프로젝트 목록</span>
    <button class="btn btn-sm btn-outline" onclick="refreshProjects()">↻ 새로고침</button>
  </div>

  <div id="projectList" class="project-grid">
    <div class="empty-state">
      <div class="empty-icon">🎬</div>
      <div class="empty-text">아직 프로젝트가 없습니다. 위에서 주제를 입력하고 생성을 시작하세요.</div>
    </div>
  </div>

</div>

<!-- DETAIL PANEL -->
<div class="detail-overlay" id="detailOverlay" onclick="if(event.target===this)closeDetail()">
  <div class="detail-panel" id="detailPanel"></div>
</div>

<!-- TOAST -->
<div class="toast-container" id="toastContainer"></div>

<script>
// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
let projects = [];
let pollTimer = null;
let currentDetailId = null;

// ═══════════════════════════════════════
// API HELPERS
// ═══════════════════════════════════════
async function api(method, path, body = null) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const resp = await fetch(`/api${path}`, opts);
  return resp.json();
}

// ═══════════════════════════════════════
// TAB SWITCH
// ═══════════════════════════════════════
function switchTab(tab) {
  document.querySelectorAll('.create-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.create-panel').forEach(p => p.classList.remove('active'));
  
  const tabMap = { single: 0, batch: 1, topics: 2 };
  const panelMap = { single: 'panelSingle', batch: 'panelBatch', topics: 'panelTopics' };
  
  document.querySelectorAll('.create-tab')[tabMap[tab]].classList.add('active');
  document.getElementById(panelMap[tab]).classList.add('active');
  
  if (tab === 'topics') loadTopicBank();
}

// ═══════════════════════════════════════
// CREATE
// ═══════════════════════════════════════
async function createSingle() {
  const input = document.getElementById('topicInput');
  const topic = input.value.trim();
  if (!topic) return;
  
  const btn = document.getElementById('btnCreate');
  btn.disabled = true; btn.textContent = '생성 중...';
  
  try {
    const data = await api('POST', '/create', { topic });
    if (data.error) { toast(data.error, 'error'); return; }
    input.value = '';
    toast(`🎬 "${topic}" 생성 시작!`, 'success');
    refreshProjects();
    startPolling();
  } catch (e) {
    toast('오류가 발생했습니다', 'error');
  } finally {
    btn.disabled = false; btn.textContent = '생성 시작';
  }
}

async function createBatch() {
  const input = document.getElementById('batchInput');
  const text = input.value.trim();
  if (!text) return;

  const topics = text.split('\n').filter(l => l.trim() && !l.trim().startsWith('#'));
  if (!topics.length) { toast('유효한 주제가 없습니다', 'error'); return; }

  const btn = document.getElementById('btnBatch');
  btn.disabled = true; btn.textContent = '등록 중...';

  try {
    const data = await api('POST', '/batch', { topics });
    if (data.error) { toast(data.error, 'error'); return; }
    input.value = '';
    toast(`📦 ${data.count}개 프로젝트 일괄 등록!`, 'success');
    refreshProjects();
    startPolling();
  } catch (e) {
    toast('오류가 발생했습니다', 'error');
  } finally {
    btn.disabled = false; btn.textContent = '일괄 생성';
  }
}

// ═══════════════════════════════════════
// PROJECT LIST
// ═══════════════════════════════════════
async function refreshProjects() {
  try {
    const data = await api('GET', '/projects');
    projects = data.projects || [];
    renderProjects();
    updateStats();
  } catch (e) {
    console.error('프로젝트 목록 로드 실패:', e);
  }
}

function renderProjects() {
  const list = document.getElementById('projectList');
  
  if (!projects.length) {
    list.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🎬</div>
        <div class="empty-text">아직 프로젝트가 없습니다. 위에서 주제를 입력하고 생성을 시작하세요.</div>
      </div>`;
    return;
  }

  // 최신순 정렬
  const sorted = [...projects].sort((a, b) => (b.created_at || '').localeCompare(a.created_at || ''));

  list.innerHTML = sorted.map(p => {
    const status = getOverallStatus(p);
    const badgeClass = `badge-${status}`;
    const badgeText = { done: '완료', running: '진행중', failed: '실패', queued: '대기', pending: '대기' }[status] || '대기';
    const cardClass = status === 'running' ? 'running' : '';
    const stages = ['script', 'tts', 'media', 'video'];
    const dateStr = p.created_at ? new Date(p.created_at).toLocaleDateString('ko-KR', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }) : '';

    return `
      <div class="project-card ${cardClass}" onclick="openDetail('${p.id}')">
        <div class="card-top">
          <div class="card-topic">${escHtml(p.topic)}</div>
          <span class="card-badge ${badgeClass}">${badgeText}</span>
        </div>
        <div class="card-stages">
          ${stages.map(s => `<div class="stage-pip ${getStageClass(p, s)}"></div>`).join('')}
        </div>
        <div class="card-meta">
          <span>${dateStr}</span>
          <div class="card-actions">
            ${p.has_video ? `<button class="btn btn-sm btn-success" onclick="event.stopPropagation();downloadVideo('${p.id}')">⬇ 영상</button>` : ''}
            ${status === 'failed' ? `<button class="btn btn-sm btn-outline" onclick="event.stopPropagation();resumeProject('${p.id}')">↻ 재시도</button>` : ''}
            <button class="btn btn-sm btn-danger" onclick="event.stopPropagation();deleteProject('${p.id}')">✕</button>
          </div>
        </div>
      </div>`;
  }).join('');
}

function getOverallStatus(p) {
  if (p.task_status === 'running') return 'running';
  if (p.task_status === 'queued') return 'queued';
  if (p.is_complete) return 'done';
  
  const stages = ['script', 'tts', 'media', 'video'];
  for (const s of stages) {
    if (p.status[s] === 'failed') return 'failed';
    if (p.status[s] === 'running') return 'running';
  }
  
  const doneCount = stages.filter(s => p.status[s] === 'done').length;
  if (doneCount === 4) return 'done';
  if (doneCount > 0) return 'running';
  return 'pending';
}

function getStageClass(p, stage) {
  const st = p.status[stage];
  if (st === 'done') return 'done';
  if (st === 'failed') return 'failed';
  if (st === 'running' || (p.task_stage === stage && p.task_status === 'running')) return 'running';
  return '';
}

function updateStats() {
  const done = projects.filter(p => p.is_complete).length;
  const running = projects.filter(p => getOverallStatus(p) === 'running' || getOverallStatus(p) === 'queued').length;
  document.getElementById('statDone').textContent = done;
  document.getElementById('statRunning').textContent = running;

  // 진행 중인 작업이 있으면 폴링 유지
  if (running > 0) startPolling();
  else stopPolling();
}

// ═══════════════════════════════════════
// DETAIL PANEL
// ═══════════════════════════════════════
async function openDetail(projectId) {
  currentDetailId = projectId;
  const panel = document.getElementById('detailPanel');
  panel.innerHTML = '<div style="padding:2rem;color:var(--text-muted)">로딩 중...</div>';
  document.getElementById('detailOverlay').classList.add('open');

  try {
    const data = await api('GET', `/projects/${projectId}`);
    renderDetail(data);
  } catch (e) {
    panel.innerHTML = '<div style="padding:2rem;color:var(--error)">로드 실패</div>';
  }
}

function renderDetail(p) {
  const panel = document.getElementById('detailPanel');
  const status = p.is_complete ? 'done' : p.task_status || (p.status.script === 'failed' || p.status.tts === 'failed' || p.status.media === 'failed' || p.status.video === 'failed' ? 'failed' : 'pending');
  const stages = ['script', 'tts', 'media', 'video'];
  const stageNames = { script: '스크립트 생성', tts: '음성 합성', media: '미디어 수집', video: '영상 조립' };

  let html = `
    <button class="detail-close" onclick="closeDetail()">×</button>
    <div class="detail-title">${escHtml(p.topic)}</div>
    <div class="detail-id">${p.id}</div>

    <!-- 단계 상태 -->
    <div class="detail-section">
      <div class="detail-section-title">파이프라인 진행 상태</div>
      ${stages.map(s => {
        const st = p.status[s] || 'pending';
        const icon = { done: '✅', running: '🔄', failed: '❌', pending: '⬜' }[st] || '⬜';
        return `<div style="padding:0.3rem 0;font-size:0.85rem">${icon} ${stageNames[s]} — <span style="color:var(--text-secondary)">${st}</span></div>`;
      }).join('')}
    </div>`;

  // 스크립트
  if (p.script) {
    html += `
    <div class="detail-section">
      <div class="detail-section-title">스크립트</div>
      <div class="script-field">
        <div class="script-label">제목</div>
        <div class="script-text">${escHtml(p.script.title || '')}</div>
      </div>
      <div class="script-field">
        <div class="script-label">Hook</div>
        <div class="script-text">${escHtml(p.script.hook || '')}</div>
      </div>
      ${(p.script.body || []).map(b => `
        <div class="script-field">
          <div class="script-label">꿀팁 ${b.order}</div>
          <div class="script-text">${escHtml(b.text)}</div>
          <div style="font-size:0.7rem;color:var(--text-muted);margin-top:2px">🔍 ${escHtml(b.visual_keyword || '')}</div>
        </div>
      `).join('')}
      <div class="script-field">
        <div class="script-label">CTA</div>
        <div class="script-text">${escHtml(p.script.cta || '')}</div>
      </div>
      ${p.script._meta ? `<div style="font-size:0.75rem;color:var(--text-muted);margin-top:0.5rem">📊 ${p.script._meta.total_chars}자 / 약 ${p.script._meta.estimated_duration_sec}초</div>` : ''}
    </div>`;
  }

  // 오디오 메타
  if (p.audio_meta) {
    html += `
    <div class="detail-section">
      <div class="detail-section-title">오디오 (${p.audio_meta.total_duration_sec}초)</div>
      ${p.has_audio ? `<audio controls style="width:100%;margin-bottom:0.5rem" src="/api/projects/${p.id}/audio"></audio>` : ''}
      ${(p.audio_meta.segments || []).map(s =>
        `<div style="font-size:0.78rem;padding:0.15rem 0;color:var(--text-secondary)">${s.label} ${s.start.toFixed(1)}~${s.end.toFixed(1)}초</div>`
      ).join('')}
    </div>`;
  }

  // 작업 로그
  if (p.task_log && p.task_log.length) {
    html += `
    <div class="detail-section">
      <div class="detail-section-title">실행 로그</div>
      <div class="log-list">${p.task_log.map(l => `<div>${escHtml(l)}</div>`).join('')}</div>
    </div>`;
  }

  // 액션 버튼
  html += `<div class="detail-actions">`;
  if (p.has_video) {
    html += `<button class="btn btn-sm btn-success" onclick="downloadVideo('${p.id}')">⬇ 영상 다운로드</button>`;
  }
  if (status === 'failed') {
    const failedStage = stages.find(s => p.status[s] === 'failed') || '';
    html += `<button class="btn btn-sm btn-outline" onclick="resumeProject('${p.id}','${failedStage}')">↻ ${failedStage}부터 재시도</button>`;
  }
  if (p.has_script && !p.is_complete) {
    html += `<button class="btn btn-sm btn-outline" onclick="resumeProject('${p.id}','tts')">↻ TTS부터 재생성</button>`;
  }
  html += `<button class="btn btn-sm btn-danger" onclick="deleteProject('${p.id}');closeDetail()">삭제</button>`;
  html += `</div>`;

  panel.innerHTML = html;
}

function closeDetail() {
  document.getElementById('detailOverlay').classList.remove('open');
  currentDetailId = null;
}

// ═══════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════
function downloadVideo(id) {
  window.open(`/api/projects/${id}/video`, '_blank');
}

async function resumeProject(id, fromStage) {
  try {
    const data = await api('POST', `/resume/${id}`, { from_stage: fromStage || null });
    if (data.error) { toast(data.error, 'error'); return; }
    toast('↻ 재실행 시작!', 'success');
    refreshProjects();
    startPolling();
  } catch (e) {
    toast('재실행 실패', 'error');
  }
}

async function deleteProject(id) {
  if (!confirm('이 프로젝트를 삭제할까요? 생성된 영상도 함께 삭제됩니다.')) return;
  try {
    await api('DELETE', `/projects/${id}`);
    toast('🗑 삭제됨', 'success');
    refreshProjects();
  } catch (e) {
    toast('삭제 실패', 'error');
  }
}

// ═══════════════════════════════════════
// POLLING
// ═══════════════════════════════════════
function startPolling() {
  if (pollTimer) return;
  pollTimer = setInterval(async () => {
    await refreshProjects();
    // 디테일 패널이 열려있으면 자동 갱신
    if (currentDetailId) {
      try {
        const data = await api('GET', `/projects/${currentDetailId}`);
        renderDetail(data);
      } catch (e) {}
    }
  }, 3000);
}

function stopPolling() {
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
}

// ═══════════════════════════════════════
// UTILS
// ═══════════════════════════════════════
function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function toast(msg, type = '') {
  const container = document.getElementById('toastContainer');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  container.appendChild(el);
  setTimeout(() => el.remove(), 4000);
}

// ═══════════════════════════════════════
// TOPIC BANK
// ═══════════════════════════════════════
async function loadTopicBank() {
  try {
    const data = await api('GET', '/topics/bank');
    renderTopicBank(data);

    const sched = await api('GET', '/scheduler/status');
    document.getElementById('schedInfo').textContent = `매일 ${sched.run_time} / ${sched.daily_count}편`;
    document.getElementById('bankPending').textContent = `${sched.topic_bank.pending}개`;
  } catch (e) {
    console.error('주제 뱅크 로드 실패:', e);
  }
}

function renderTopicBank(data) {
  const list = document.getElementById('topicBankList');
  const pending = data.pending || [];
  document.getElementById('bankPending').textContent = `${pending.length}개`;

  if (!pending.length) {
    list.innerHTML = `<div style="text-align:center;padding:2rem;color:var(--text-muted);font-size:0.85rem">
      대기 주제가 없습니다. "AI 주제 생성" 버튼을 눌러보세요.
    </div>`;
    return;
  }

  list.innerHTML = pending.map((t, i) => `
    <div style="display:flex;align-items:center;gap:0.8rem;padding:0.6rem 0.8rem;border-bottom:1px solid var(--border);font-size:0.85rem">
      <span style="color:var(--text-muted);font-size:0.75rem;min-width:24px">${i + 1}</span>
      <div style="flex:1">
        <div style="font-weight:500">${escHtml(t.topic)}</div>
        <div style="font-size:0.72rem;color:var(--text-muted);margin-top:2px">
          ${escHtml(t.category || '')} > ${escHtml(t.subcategory || '')}
          ${t.hook_idea ? ` · 💡 ${escHtml(t.hook_idea)}` : ''}
        </div>
      </div>
      <button class="btn btn-sm btn-primary" onclick="createFromTopic('${escHtml(t.topic).replace(/'/g, "\\'")}')">▶ 생성</button>
      <button class="btn btn-sm btn-outline" onclick="skipTopic('${escHtml(t.topic).replace(/'/g, "\\'")}')">건너뛰기</button>
    </div>
  `).join('');
}

async function generateTopics(count) {
  const btn = document.getElementById('btnGenTopics');
  btn.disabled = true; btn.textContent = '🤖 생성 중...';
  try {
    const data = await api('POST', '/topics/generate', { count });
    if (data.error) { toast(data.error, 'error'); return; }
    toast(`🎯 ${data.count}개 주제 생성 완료!`, 'success');
    loadTopicBank();
  } catch (e) {
    toast('주제 생성 실패', 'error');
  } finally {
    btn.disabled = false; btn.textContent = '🤖 AI 주제 5개 생성';
  }
}

async function createFromNext(count) {
  try {
    const data = await api('POST', '/topics/create-next', { count });
    if (data.error) { toast(data.error, 'error'); return; }
    toast(`🎬 ${data.count}편 영상 생성 시작!`, 'success');
    loadTopicBank();
    refreshProjects();
    startPolling();
  } catch (e) {
    toast('생성 실패', 'error');
  }
}

async function createFromTopic(topic) {
  try {
    const data = await api('POST', '/create', { topic });
    if (data.error) { toast(data.error, 'error'); return; }
    // 사용 처리
    await api('POST', '/topics/skip', { topic }); // mark as used via skip for simplicity
    toast(`🎬 "${topic}" 생성 시작!`, 'success');
    loadTopicBank();
    refreshProjects();
    startPolling();
  } catch (e) {
    toast('생성 실패', 'error');
  }
}

async function skipTopic(topic) {
  try {
    await api('POST', '/topics/skip', { topic });
    toast('건너뛰기 완료', 'success');
    loadTopicBank();
  } catch (e) {
    toast('오류', 'error');
  }
}

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  refreshProjects();
  loadTopicBank();
  // 키보드 단축키
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeDetail();
  });
});
</script>
</body>
</html>
