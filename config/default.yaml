```
project:
  output_dir: "./output"
  name_format: "{date}_{topic_slug}"

video:
  width: 720
  height: 1280
  fps: 24
  max_duration_sec: 58
  format: "mp4"
  codec: "libx264"

script:
  provider: "claude"
  model: "claude-haiku-4-5-20251001"
  language: "ko"
  max_chars: 500
  temperature: 0.8

tts:
  provider: "edge"
  voice_id: "ko-KR-SunHiNeural"
  speed: "+10%"
  output_format: "mp3"

media:
  provider: "pexels"
  fallback: "local"
  clip_duration_sec: 5
  max_clips: 6
  search_language: "en"
  local_media_dir: "./assets/local_clips"

style:
  font: "NotoSansKR-Bold"
  font_path: "./assets/fonts/NotoSansKR-Bold.ttf"
  font_size: 36
  text_color: "#FFFFFF"
  text_stroke_color: "#000000"
  text_stroke_width: 2
  text_position: "center"
  bg_music_dir: "./assets/bgm"
  bg_music_volume: 0.08
  transition: "crossfade"
  transition_duration: 0.5

scheduler:
  enabled: true
  run_time: "06:00"
  daily_count: 1
  auto_refill_threshold: 3
